<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 10px; }
        #header { margin-bottom: 10px; }
        input { background: #111; color: #fff; border: 1px solid #333; padding: 5px; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #888; border-bottom: 1px solid #333; padding: 5px 0; }
        td { padding: 5px 0; }
    </style>
</head>
<body>
    <div id="header">
        <h2>OVERNIGHT TICKER</h2>
        <input type="text" id="stockInput" placeholder="e.g. GOOG, TSLA, NVDA">
    </div>
    <table>
        <thead>
            <tr>
                <th>OPEN</th>
                <th>CURRENT PRICE</th>
                <th>CLOSE</th>
                <th>AFTER HOURS</th>
                <th>OVERNIGHT</th>
            </tr>
        </thead>
        <tbody id="tapeBody">
            <!-- Incoming data will render here -->
        </tbody>
    </table>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://overnight-tape.onrender.com');
        const tapeBody = document.getElementById('tapeBody');

        // Debugging listener to ensure data structure matches your 5 headers
        socket.onAny((event, data) => {
            console.log("RECEIVED EVENT:", event, "DATA:", data);
        });

        socket.on('trade', (data) => {
            const row = `<tr>
                <td>${data.open || '-'}</td>
                <td>${data.currentPrice || '-'}</td>
                <td>${data.close || '-'}</td>
                <td>${data.afterHours || '-'}</td>
                <td>${data.overnight || '-'}</td>
            </tr>`;
            tapeBody.insertAdjacentHTML('afterbegin', row);
        });
    </script>
</body>
</html>
