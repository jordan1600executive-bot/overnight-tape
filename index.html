<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overnight  Ticker | Live Tape Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="text-emerald-400 font-['JetBrains_Mono'] select-none bg-[#050505] min-h-screen flex flex-col">

  <div class="p-4 border-b border-zinc-900 bg-black/50 backdrop-blur sticky top-0 z-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-lg font-black tracking-wider text-white">OVERNIGHT TICKER</h1>
      <p class="text-[9px] text-zinc-500 uppercase tracking-widest font-bold">Live Order Flow • Overnight Stock Trades</p>
    </div>
    
    <div class="w-full sm:w-auto flex items-center gap-2 bg-zinc-950 border border-zinc-800 rounded px-3 py-1.5 focus-within:border-emerald-500 transition-colors">
      <svg class="w-4 h-4 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      <input type="text" id="search-box" placeholder="FILTER TICKER (IEP, TSLA...)" class="bg-transparent text-white text-xs focus:outline-none uppercase w-full sm:w-48 placeholder-zinc-600 font-bold tracking-wide">
    </div>
  </div>

  <div class="flex-1 overflow-x-auto">
    <table id="tape" class="w-full text-left border-collapse">
      <thead>
        <tr class="text-zinc-600 border-b border-zinc-900 bg-zinc-950/50 text-[10px] uppercase tracking-wider font-bold">
          <th class="p-3">TIME</th>
          <th>SYMBOL</th>
          <th>PRICE</th>
          <th>SIZE</th>
        </tr>
      </thead>
      <tbody id="tape-rows" class="text-xs divide-y divide-zinc-950">
        </tbody>
    </table>
  </div> <script async="async" data-cfasync="false" src="https://pl29535740.effectivecpmnetwork.com/b93660e9eebb2cbca7624d67b9a9e218/invoke.js"></script>
<div id="container-b93660e9eebb2cbca7624d67b9a9e218"></div>


  <script>
    // Pointing directly to your live Render engine
    const socket = io('https://overnight-tape.onrender.com');
    const tableBody = document.getElementById('tape-rows');
    const searchBox = document.getElementById('search-box');

    socket.on('trade', (t) => {
      let row = tableBody.insertRow(0);
      row.className = "hover:bg-zinc-950/40 transition-colors duration-75 data-row opacity-0";
      row.style.animation = "fadeIn 0.2s forwards";
      row.setAttribute('data-symbol', t.s.toUpperCase());
      
      const timeStr = new Date(t.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
      
      row.innerHTML = `
        <td class="p-3 text-zinc-600 font-medium">${timeStr}</td>
        <td class="font-bold text-slate-100 tracking-wide">${t.s}</td>
        <td class="text-emerald-400 font-semibold">$${t.p.toFixed(2)}</td>
        <td class="text-zinc-400 font-medium">${t.v.toLocaleString()}</td>
      `;

      const currentQuery = searchBox.value.trim().toUpperCase();
      if (currentQuery && t.s.toUpperCase() !== currentQuery) {
        row.classList.add('hidden');
      }

      if(tableBody.rows.length > 50) {
        tableBody.deleteRow(50);
      }
    });

    searchBox.addEventListener('input', () => {
      const query = searchBox.value.trim().toUpperCase();
      const rows = tableBody.getElementsByClassName('data-row');
      
      for (let row of rows) {
        const symbol = row.getAttribute('data-symbol');
        if (!query || symbol === query) {
          row.classList.remove('hidden');
        } else {
          row.classList.add('hidden');
        }
      }
    });
  </script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</body>
</html>
