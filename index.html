<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVERNIGHT TICKER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'JetBrains Mono', monospace; }</style>
</head>
<body class="bg-[#050505] text-emerald-400">

  <div class="p-4 border-b border-zinc-900">
    <h1 class="text-white font-bold text-lg tracking-widest">OVERNIGHT TICKER</h1>
    <p class="text-[9px] text-zinc-600 uppercase tracking-widest font-bold">Live Flow • Real-Time Tape</p>
  </div>

  <div class="p-4">
    <input type="text" id="search-box" placeholder="TYPE TICKER & ENTER" class="w-full bg-[#050505] border border-zinc-800 p-2 text-white text-xs uppercase outline-none focus:border-emerald-500">
  </div>

  <div id="ticker-stats" class="hidden px-4 mb-4">
    <div class="flex gap-6 text-[10px] text-zinc-500 font-bold uppercase">
      <span>LAST: <span id="stat-last" class="text-white">--</span></span>
      <span>HIGH: <span id="stat-high" class="text-white">--</span></span>
      <span>LOW: <span id="stat-low" class="text-white">--</span></span>
    </div>
  </div>

  <div class="px-4">
    <table class="w-full text-left text-xs text-zinc-400">
      <thead>
        <tr class="border-b border-zinc-900"><th class="py-2">TIME</th><th>SYMBOL</th><th>PRICE</th><th>SIZE</th></tr>
      </thead>
      <tbody id="tape-rows" class="text-emerald-400"></tbody>
    </table>
  </div>

  <script>
    const socket = io('https://overnight-tape.onrender.com');
    const searchBox = document.getElementById('search-box');
    const statsBar = document.getElementById('ticker-stats');
    
    let currentSymbol = "";
    let high = 0;
    let low = 999999;

    searchBox.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        currentSymbol = e.target.value.toUpperCase();
        high = 0;
        low = 999999;
        statsBar.classList.remove('hidden');
        document.getElementById('stat-last').innerText = "--";
      }
    });

    socket.on('trade', (t) => {
      if (t.s === currentSymbol) {
        // Update stats
        if (t.p > high) high = t.p;
        if (t.p < low) low = t.p;
        document.getElementById('stat-last').innerText = t.p.toFixed(2);
        document.getElementById('stat-high').innerText = high.toFixed(2);
        document.getElementById('stat-low').innerText = low.toFixed(2);
      }
      
      // Update tape
      let row = document.getElementById('tape-rows').insertRow(0);
      row.innerHTML = `<td class="py-2">${new Date(t.t).toLocaleTimeString()}</td><td class="text-white font-bold">${t.s}</td><td class="text-emerald-400">$${t.p.toFixed(2)}</td><td>${t.v.toLocaleString()}</td>`;
      if(document.getElementById('tape-rows').rows.length > 50) document.getElementById('tape-rows').deleteRow(50);
    });
  </script>
</body>
</html>
