<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OVERNIGHT TICKER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #000; color: #fff; font-family: sans-serif; padding: 20px; }
    .label { color: #888; font-size: 18px; margin-top: 20px; text-transform: uppercase; }
    .value { color: #34d399; font-size: 40px; font-weight: 800; }
    input { width: 100%; padding: 20px; background: #111; border: 2px solid #333; color: white; font-size: 24px; margin-top: 10px; }
  </style>
</head>
<body>

  <h1>OVERNIGHT TICKER</h1>
  <p>SEARCH TICKER (e.g. AAPL, TSLA)</p>
  <input type="text" id="search-box" placeholder="TYPE TICKER...">

  <div id="dashboard" style="display:none;">
    <div class="label">DATE</div>
    <div id="val-date" class="value">--</div>
    
    <div class="label">PREVIOUS CLOSE</div>
    <div id="val-close" class="value">--</div>
    
    <div class="label">OPEN PRICE</div>
    <div id="val-open" class="value">--</div>
    
    <div class="label">LAST PRICE</div>
    <div id="val-current" class="value">--</div>
    
    <div class="label">AFTER HOURS / OVERNIGHT</div>
    <div id="val-ah" class="value">--</div>
  </div>

<script>
  document.getElementById('search-box').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
      const sym = e.target.value.toUpperCase();
      document.getElementById('dashboard').style.display = 'block';
      
      try {
        const response = await fetch(`https://my-stock-proxy.onrender.com/stock/${sym}`);
        const data = await response.json();
        const q = data.chart.result[0].meta;
        const prices = data.chart.result[0].indicators.quote[0];

        document.getElementById('val-date').innerText = new Date().toLocaleDateString();
        document.getElementById('val-close').innerText = "$" + q.chartPreviousClose.toFixed(2);
        document.getElementById('val-open').innerText = "$" + (prices.open[0] || 0).toFixed(2);
        document.getElementById('val-current').innerText = "$" + (q.regularMarketPrice || 0).toFixed(2);
        
        // This is the fix for After Hours data
        const ah = q.postMarketPrice || q.preMarketPrice;
        document.getElementById('val-ah').innerText = ah ? "$" + ah.toFixed(2) : "NO DATA";
      } catch (err) {
        alert("Ticker not found");
      }
    }
  });
</script>
</body>
</html>
