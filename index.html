<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <title>OVERNIGHT TICKER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { font-family: sans-serif; }
    /* Force consistent table sizing */
    table { width: 100%; table-layout: fixed; }
    th, td { text-align: left; padding: 10px 4px; font-size: 14px; }
  </style>
</head>
<body class="bg-[#050505] text-emerald-400">

  <div class="p-4 border-b border-zinc-900">
    <h1 class="text-white font-bold text-lg tracking-widest">OVERNIGHT TICKER</h1>
    <p class="text-xs text-zinc-600 uppercase tracking-widest font-bold">AFTER HOURS AND OVERNIGHT STOCK FLOW DATA</p>
  </div>

  <div class="p-4">
    <input type="text" id="search-box" placeholder="SEARCH (e.g. AAPL, TSLA)" class="w-full bg-[#050505] border border-zinc-800 p-3 text-white text-sm uppercase outline-none focus:border-emerald-500">
  </div>

  <div id="ticker-stats" class="hidden px-4 mb-4">
    <div class="flex gap-6 text-sm text-zinc-500 font-bold uppercase">
      <span>DATE: <span id="stat-date" class="text-emerald-600">--</span></span>
      <span>OPEN: <span id="stat-open" class="text-white">--</span></span>
      <span>CLOSE: <span id="stat-close" class="text-white">--</span></span>
    </div>
  </div>

  <div class="px-2">
    <table>
      <thead>
        <tr class="border-b border-zinc-900 text-zinc-600">
          <th>TIME</th><th>STOCK</th><th>PRICE</th><th>SIZE</th>
        </tr>
      </thead>
      <tbody id="tape-rows" class="text-emerald-400"></tbody>
    </table>
  </div>

  <script>
    const API_KEY = "bPCP1oc0Ta1IZy1w74l7VlaOM582eO0i";
    const socket = io('https://overnight-tape.onrender.com');
    
    socket.on('trade', (t) => {
      let row = document.getElementById('tape-rows').insertRow(0);
      row.innerHTML = `<td>${new Date(t.t).toLocaleTimeString()}</td><td class="text-white font-bold">${t.s}</td><td class="text-emerald-400">$${t.p.toFixed(2)}</td><td>${t.v.toLocaleString()}</td>`;
      if(document.getElementById('tape-rows').rows.length > 50) document.getElementById('tape-rows').deleteRow(50);
    });

    document.getElementById('search-box').addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        const sym = e.target.value.toUpperCase();
        document.getElementById('ticker-stats').classList.remove('hidden');
        document.getElementById('stat-date').innerText = "FETCHING...";
        
        try {
          // New connection method: using a direct URL request without complex headers
          const response = await fetch(`https://financialmodelingprep.com/api/v3/historical-price-full/${sym}?timeseries=1&apikey=${API_KEY}`);
          const data = await response.json();
          
          if(data.historical && data.historical.length > 0) {
            const q = data.historical[0];
            document.getElementById('stat-date').innerText = q.date;
            document.getElementById('stat-open').innerText = "$" + q.open.toFixed(2);
            document.getElementById('stat-close').innerText = "$" + q.close.toFixed(2);
          } else {
            document.getElementById('stat-date').innerText = "NO DATA";
          }
        } catch (err) {
          document.getElementById('stat-date').innerText = "RETRYING...";
        }
      }
    });
  </script>
</body>
</html>
