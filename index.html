<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <title>OVERNIGHT TICKER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: sans-serif; }
    input { font-size: 28px !important; padding: 20px !important; }
    .data-label { color: #a1a1aa; font-size: 20px; text-transform: uppercase; }
    .data-value { color: #fff; font-size: 32px; font-weight: bold; }
  </style>
</head>
<body class="bg-[#050505] text-emerald-400">

  <div class="p-8 border-b border-zinc-900">
    <h1 class="text-white font-bold text-5xl">OVERNIGHT TICKER</h1>
    <p class="text-xl text-white uppercase tracking-wide font-bold mt-2">STOCK DAY DATA</p>
  </div>

  <div class="p-8">
    <input type="text" id="search-box" placeholder="SEARCH TICKER (e.g. AAPL, TSLA)" class="w-full bg-[#050505] border-4 border-zinc-700 text-white uppercase outline-none focus:border-emerald-500">
  </div>

  <div id="dashboard" class="hidden px-8 grid grid-cols-2 md:grid-cols-5 gap-6">
    <div><div class="data-label">Date</div><div id="val-date" class="data-value">--</div></div>
    <div><div class="data-label">Prev Close</div><div id="val-close" class="data-value">--</div></div>
    <div><div class="data-label">Open Price</div><div id="val-open" class="data-value">--</div></div>
    <div><div class="data-label">Last Price</div><div id="val-current" class="data-value">--</div></div>
  </div>

<script>
  // List of proxies to try
  const proxies = [
    "https://my-stock-proxy.onrender.com/stock/", 
    "https://api.allorigins.win/get?url=" 
  ];

  async function fetchStockData(sym) {
    for (const proxy of proxies) {
      try {
        let fetchUrl = proxy.includes("allorigins") 
            ? `${proxy}${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + sym)}`
            : `${proxy}${sym}`;

        const response = await fetch(fetchUrl);
        if (!response.ok) throw new Error("Proxy failed");

        let data = await response.json();
        
        // Handle format if using a general proxy like allorigins
        if (proxy.includes("allorigins")) {
            data = JSON.parse(data.contents);
        }

        return data; // Return the data if successful
      } catch (err) {
        console.warn(`Proxy ${proxy} failed, trying next...`);
      }
    }
    throw new Error("All proxies failed");
  }

  document.getElementById('search-box').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
      const sym = e.target.value.toUpperCase();
      document.getElementById('dashboard').classList.remove('hidden');
      
      try {
        const data = await fetchStockData(sym);
        const q = data.chart.result[0].meta;
        const prices = data.chart.result[0].indicators.quote[0];

        document.getElementById('val-date').innerText = new Date().toLocaleDateString();
        document.getElementById('val-close').innerText = "$" + q.chartPreviousClose.toFixed(2);
        document.getElementById('val-open').innerText = "$" + prices.open[0].toFixed(2);
        document.getElementById('val-current').innerText = "$" + q.regularMarketPrice.toFixed(2);
      } catch (err) {
        alert("Could not fetch data for " + sym + ". Please try again.");
      }
    }
  });
</script>
</body>
</html>
