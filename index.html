<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVERNIGHT TICKER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Courier New', Courier, monospace; }
    .data-label { color: #666; font-size: 12px; text-transform: uppercase; }
    .data-value { color: #fff; font-size: 18px; font-weight: bold; margin-bottom: 12px; }
    input { font-size: 16px !important; padding: 10px !important; }
  </style>
</head>
<body class="bg-[#050505] text-white p-4">

  <div class="mb-6">
    <h1 class="text-xl font-bold">OVERNIGHT TICKER</h1>
    <input type="text" id="search-box" placeholder="SEARCH TICKER (e.g. GOOG)..." class="w-full mt-4 bg-[#111] border border-zinc-700 text-white uppercase outline-none focus:border-emerald-500 rounded px-2">
  </div>

  <div id="dashboard" class="hidden flex flex-col gap-2">
    <div><div class="data-label">Date</div><div id="val-date" class="data-value">--</div></div>
    <div><div class="data-label">Previous Close</div><div id="val-close" class="data-value">--</div></div>
    <div><div class="data-label">Open Price</div><div id="val-open" class="data-value">--</div></div>
    <div><div class="data-label">Current Last Price</div><div id="val-current" class="data-value">--</div></div>
    <div><div class="data-label">After Hours/Pre Mkt</div><div id="val-ah" class="data-value text-emerald-400">--</div></div>
    <div><div class="data-label">Overnight Status</div><div id="val-overnight" class="data-value">--</div></div>
  </div>

<script>
  document.getElementById('search-box').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
      const sym = e.target.value.toUpperCase();
      try {
        const response = await fetch(`https://my-stock-proxy.onrender.com/stock/${sym}`);
        const data = await response.json();
        const q = data.chart.result[0].meta;
        const prices = data.chart.result[0].indicators.quote[0];

        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('val-date').innerText = new Date().toLocaleDateString();
        document.getElementById('val-close').innerText = "$" + q.chartPreviousClose.toFixed(2);
        document.getElementById('val-open').innerText = "$" + (prices.open[0] ? prices.open[0].toFixed(2) : "N/A");
        document.getElementById('val-current').innerText = "$" + q.regularMarketPrice.toFixed(2);
        
        // Improved logic for AH/Pre-market
        const ahPrice = q.postMarketPrice || q.preMarketPrice || q.regularMarketPrice;
        document.getElementById('val-ah').innerText = "$" + ahPrice.toFixed(2);
        document.getElementById('val-overnight').innerText = (q.postMarketPrice || q.preMarketPrice) ? "ACTIVE" : "CLOSED";
      } catch (err) {
        alert("Ticker not found or data feed offline.");
      }
    }
  });
</script>
</body>
</html>
