<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVERNIGHT TICKER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-[#050505] text-zinc-500 font-mono text-xs">

  <div class="p-4 border-b border-zinc-900">
    <h1 class="text-white font-bold">OVERNIGHT TICKER</h1>
    <p class="text-[9px] uppercase tracking-widest text-zinc-600">Live Flow • Overnight Stock Trades</p>
  </div>

  <div class="p-4">
    <input type="text" id="search-box" placeholder="TYPE TICKER & ENTER" class="w-full bg-zinc-900 text-white p-2 rounded uppercase border border-zinc-800 focus:border-emerald-500 outline-none">
  </div>

  <div id="ticker-stats" class="hidden p-4 bg-black border-y border-zinc-900 mb-4">
    <div class="flex justify-between text-zinc-400">
      <span>OPEN: <span id="stat-open" class="text-white">--</span></span>
      <span>CLOSE: <span id="stat-close" class="text-white">--</span></span>
      <span>AH: <span id="stat-after" class="text-white">--</span></span>
    </div>
  </div>

  <div id="tape" class="p-4 pt-0">
    <table class="w-full text-left">
      <tbody id="tape-rows" class="text-emerald-400"></tbody>
    </table>
  </div>

  <script>
    const socket = io('https://overnight-tape.onrender.com');
    const searchBox = document.getElementById('search-box');
    const statsBar = document.getElementById('ticker-stats');
    const POLYGON_KEY = '7YbyChnnKkKvBeBAYPgJUI3tbiUpCq2a';

    socket.on('trade', (t) => {
      let row = document.getElementById('tape-rows').insertRow(0);
      row.innerHTML = `<td class="p-1">${new Date(t.t).toLocaleTimeString()}</td><td class="text-white">${t.s}</td><td class="text-right">$${t.p.toFixed(2)}</td>`;
      if(document.getElementById('tape-rows').rows.length > 30) document.getElementById('tape-rows').deleteRow(30);
    });

    searchBox.addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        const sym = e.target.value.toUpperCase();
        statsBar.classList.remove('hidden');
        
        let d = new Date();
        while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
        const dateStr = d.toISOString().split('T')[0];

        try {
          const res = await fetch(`https://api.polygon.io/v1/open-close/${sym}/${dateStr}?adjusted=true&apiKey=${POLYGON_KEY}`);
          const data = await res.json();
          if(data.status === 'OK') {
            document.getElementById('stat-open').innerText = data.open.toFixed(2);
            document.getElementById('stat-close').innerText = data.close.toFixed(2);
            document.getElementById('stat-after').innerText = data.afterHours ? data.afterHours.toFixed(2) : "0.00";
          } else {
            document.getElementById('stat-open').innerText = "LIMIT";
          }
        } catch (err) {
          console.error(err);
        }
      }
    });
  </script>
</body>
</html>
