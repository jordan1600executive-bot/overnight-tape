<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <title>OVERNIGHT TICKER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: sans-serif; }
    input { font-size: 20px !important; padding: 15px !important; }
    .data-label { color: #a1a1aa; font-size: 12px; text-transform: uppercase; }
    .data-value { color: #fff; font-size: 20px; font-weight: bold; }
  </style>
</head>
<body class="bg-[#050505] text-emerald-400">

  <div class="p-6 border-b border-zinc-900">
    <h1 class="text-white font-bold text-3xl">OVERNIGHT TICKER</h1>
  </div>

  <div class="p-8">
    <input type="text" id="search-box" placeholder="e.g. GOOG, TSLA, NVDA" class="w-full bg-[#050505] border-2 border-zinc-700 text-white uppercase outline-none focus:border-emerald-500">
  </div>

  <div id="dashboard" class="hidden px-8 grid grid-cols-2 md:grid-cols-7 gap-4">
    <div><div class="data-label">Date</div><div id="val-date" class="data-value">--</div></div>
    <div><div class="data-label">Prev Close</div><div id="val-close" class="data-value">--</div></div>
    <div><div class="data-label">Open</div><div id="val-open" class="data-value">--</div></div>
    <div><div class="data-label">Last</div><div id="val-current" class="data-value">--</div></div>
    <div><div class="data-label">After Hours</div><div id="val-ah" class="data-value">--</div></div>
    <div><div class="data-label">Overnight</div><div id="val-overnight" class="data-value">--</div></div>
    <div><div class="data-label">Pre-Market</div><div id="val-pre" class="data-value">--</div></div>
  </div>

<script>
  document.getElementById('search-box').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
      const sym = e.target.value.toUpperCase();
      document.getElementById('dashboard').classList.remove('hidden');
      try {
        const response = await fetch(`https://my-stock-proxy.onrender.com/stock/${sym}`);
        const data = await response.json();
        const meta = data.chart.result[0].meta;
        const quotes = data.chart.result[0].indicators.quote[0];

        document.getElementById('val-date').innerText = new Date().toLocaleDateString();
        document.getElementById('val-close').innerText = "$" + meta.chartPreviousClose.toFixed(2);
        document.getElementById('val-open').innerText = "$" + quotes.open[0].toFixed(2);
        document.getElementById('val-current').innerText = "$" + meta.regularMarketPrice.toFixed(2);
        
        // Populate based on your specific session definitions
        document.getElementById('val-ah').innerText = meta.postMarketPrice ? "$" + meta.postMarketPrice.toFixed(2) : "--";
        document.getElementById('val-overnight').innerText = meta.preMarketPrice ? "$" + meta.preMarketPrice.toFixed(2) : "--"; // Placeholder logic for 8pm-4am
        document.getElementById('val-pre').innerText = meta.preMarketPrice ? "$" + meta.preMarketPrice.toFixed(2) : "--";

      } catch (err) {
        console.error("Fetch Error:", err);
      }
    }
  });
</script>
</body>
</html>
