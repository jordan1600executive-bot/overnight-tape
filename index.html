<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <title>OVERNIGHT TERMINAL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'JetBrains Mono', monospace; }</style>
</head>
<body class="bg-[#050505] text-emerald-400 min-h-screen">

  <div class="p-4 border-b border-zinc-900">
    <h1 class="text-white font-bold text-lg tracking-widest">OVERNIGHT TERMINAL</h1>
    
    <div id="flow-stats" class="flex gap-6 mt-2 text-[10px] text-zinc-500 font-bold">
      <span>VOL: <span id="stat-vol" class="text-white">0</span></span>
      <span>$AMT: <span id="stat-amt" class="text-white">$0</span></span>
    </div>
  </div>

  <div id="ticker-stats" class="hidden p-4 bg-black border-b border-zinc-900">
    <div class="flex justify-between text-[10px] text-zinc-500 font-bold uppercase">
      <span>OPEN: <span id="stat-open" class="text-white">--</span></span>
      <span>CLOSE: <span id="stat-close" class="text-white">--</span></span>
      <span>AH: <span id="stat-after" class="text-white">--</span></span>
    </div>
  </div>

  <div class="p-4">
    <input type="text" id="search-box" placeholder="SEARCH TICKER..." class="w-full bg-[#050505] border border-zinc-800 p-2 text-white text-xs uppercase outline-none focus:border-emerald-500">
  </div>

  <table class="w-full text-left text-xs">
    <tbody id="tape-rows"></tbody>
  </table>

  <script>
    const socket = io('https://overnight-tape.onrender.com');
    const searchBox = document.getElementById('search-box');
    const statsBar = document.getElementById('ticker-stats');
    
    let totalVolume = 0;
    let totalDollarValue = 0;

    // 1. Handle Live Flow
    socket.on('trade', (t) => {
      totalVolume += t.v;
      totalDollarValue += (t.p * t.v);

      document.getElementById('stat-vol').innerText = totalVolume.toLocaleString();
      document.getElementById('stat-amt').innerText = '$' + Math.round(totalDollarValue).toLocaleString();

      let row = document.getElementById('tape-rows').insertRow(0);
      row.innerHTML = `<td class="p-2 text-zinc-600">${new Date(t.t).toLocaleTimeString()}</td><td class="text-white font-bold">${t.s}</td><td class="text-emerald-400">$${t.p.toFixed(2)}</td>`;
      if(document.getElementById('tape-rows').rows.length > 50) document.getElementById('tape-rows').deleteRow(50);
    });

    // 2. Handle Search (Yahoo Proxy)
    searchBox.addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        const sym = e.target.value.toUpperCase();
        statsBar.classList.remove('hidden');
        
        try {
          const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d`);
          const data = await res.json();
          const meta = data.chart.result[0].meta;
          const q = data.chart.result[0].indicators.quote[0];
          
          document.getElementById('stat-open').innerText = q.open[q.open.length-1].toFixed(2);
          document.getElementById('stat-close').innerText = meta.previousClose.toFixed(2);
          document.getElementById('stat-after').innerText = meta.regularMarketPrice.toFixed(2);
        } catch (err) {
          document.getElementById('stat-open').innerText = "N/A";
        }
      }
    });
  </script>
</body>
</html>
