<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-[#050505] text-white">

  <input type="text" id="search-box" class="w-full bg-zinc-900 p-8 text-3xl">
  <table class="w-full text-left">
    <tbody id="tape-rows"></tbody>
  </table>

  <script>
    const socket = io('https://overnight-tape.onrender.com');
    
    socket.on('trade', (t) => {
      let row = document.getElementById('tape-rows').insertRow(0);
      row.innerHTML = `<td>${t.t}</td><td>${t.s}</td><td>${t.p}</td><td>${t.v}</td>`;
    });

    document.getElementById('search-box').addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        const sym = e.target.value.toUpperCase();
        // Just testing the fetch connection
        const response = await fetch(`https://my-stock-proxy.onrender.com/stock/${sym}`);
        const data = await response.json();
        console.log("TESTING DATA:", data);
        alert("Check console for data!");
      }
    });
  </script>
</body>
</html>
