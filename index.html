<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVERNIGHT TICKER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: sans-serif; }
    .data-label { color: #a1a1aa; font-size: 18px; text-transform: uppercase; margin-bottom: 4px; }
    .data-value { color: #fff; font-size: 36px; font-weight: bold; margin-bottom: 20px; }
    input { font-size: 20px !important; padding: 20px !important; }
  </style>
</head>
<body class="bg-[#050505] text-white p-8">

  <div class="border-b border-zinc-900 pb-8 mb-8">
    <h1 class="text-5xl font-bold">OVERNIGHT TICKER</h1>
    <p class="text-xl text-white uppercase tracking-wide font-bold mt-2">STOCK DAY AND AFTER HOURS AND OVERNIGHT DATA</p>
  </div>

  <div class="mb-8">
    <input type="text" id="search-box" placeholder="SEARCH TICKER..." class="w-full bg-[#050505] border-4 border-zinc-700 text-white uppercase outline-none focus:border-emerald-500 rounded">
  </div>

  <div id="dashboard" class="hidden flex flex-col gap-4">
    <div><div class="data-label">Date</div><div id="val-date" class="data-value text-emerald-500">--</div></div>
    <div><div class="data-label">Previous Close</div><div id="val-close" class="data-value">--</div></div>
    <div><div class="data-label">Open Price</div><div id="val-open" class="data-value">--</div></div>
    <div><div class="data-label">Current Last Price</div><div id="val-current" class="data-value">--</div></div>
    <div><div class="data-label">After Hours Price</div><div id="val-ah" class="data-value">--</div></div>
    <div><div class="data-label">Overnight Status</div><div id="val-overnight" class="data-value text-emerald-400">--</div></div>
  </div>

<script>
  document.getElementById('search-box').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
      const sym = e.target.value.toUpperCase();
      document.getElementById('dashboard').classList.remove('hidden');
      
      try {
        const response = await fetch(`https://my-stock-proxy.onrender.com/stock/${sym}`);
        const data = await response.json();
        const q = data.chart.result[0].meta;
        const prices = data.chart.result[0].indicators.quote[0];

        document.getElementById('val-date').innerText = new Date().toLocaleDateString();
        document.getElementById('val-close').innerText = "$" + q.chartPreviousClose.toFixed(2);
        document.getElementById('val-open').innerText = "$" + prices.open[0].toFixed(2);
        document.getElementById('val-current').innerText = "$" + q.regularMarketPrice.toFixed(2);
        
        // After Hours/Overnight logic
        const ahPrice = q.postMarketPrice || q.preMarketPrice;
        document.getElementById('val-ah').innerText = ahPrice ? "$" + ahPrice.toFixed(2) : "--";
        document.getElementById('val-overnight').innerText = (q.postMarketPrice || q.preMarketPrice) ? "MARKET ACTIVE" : "MARKET CLOSED";
      } catch (err) {
        alert("Ticker not found");
      }
    }
  });
</script>
</body>
</html>
