<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="bg-[#050505] text-emerald-400 font-mono">
  <div class="p-4 border-b border-zinc-900">
    <h1 class="text-white font-bold">OVERNIGHT TICKER</h1>
  </div>

  <div class="p-4">
    <input type="text" id="search-box" placeholder="TYPE TICKER & ENTER" class="w-full bg-zinc-900 text-white p-2 rounded uppercase">
  </div>

  <div id="stats" class="hidden p-4 bg-zinc-950 text-xs border border-zinc-800 mx-4 rounded">
    <div id="date-display" class="text-zinc-500 mb-2">DATE: --</div>
    <div class="flex gap-4 text-white">
      <span>OPEN: <span id="val-open">--</span></span>
      <span>CLOSE: <span id="val-close">--</span></span>
      <span>AH: <span id="val-ah">--</span></span>
    </div>
  </div>

  <script>
    const searchBox = document.getElementById('search-box');
    const statsDiv = document.getElementById('stats');

    searchBox.addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        const sym = e.target.value.toUpperCase();
        statsDiv.classList.remove('hidden');
        document.getElementById('date-display').innerText = "LOADING...";
        
        try {
          const to = Math.floor(Date.now() / 1000);
          const from = to - (86400 * 7);
          const url = `https://finnhub.io/api/v1/stock/candle?symbol=${sym}&resolution=D&from=${from}&to=${to}&token=d89q8dhr01qhi7rtj62g`;
          
          const res = await fetch(url);
          const data = await res.json();
          
          if(data.s === 'ok') {
            const i = data.c.length - 1;
            document.getElementById('date-display').innerText = "DATE: " + new Date(data.t[i] * 1000).toLocaleDateString();
            document.getElementById('val-open').innerText = data.o[i].toFixed(2);
            document.getElementById('val-close').innerText = data.c[i-1].toFixed(2);
            document.getElementById('val-ah').innerText = data.c[i].toFixed(2);
          } else {
            document.getElementById('date-display').innerText = "ERROR: NO DATA";
          }
        } catch (err) {
          document.getElementById('date-display').innerText = "ERROR: CONNECTION FAILED";
        }
      }
    });
  </script>
</body>
</html>
