<!DOCTYPE html>
<html class="bg-[#050505]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVERNIGHT DASHBOARD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: sans-serif; }
    .data-val { font-size: 3rem; font-weight: 800; color: #34d399; }
    .label { font-size: 1rem; color: #a1a1aa; text-transform: uppercase; }
  </style>
</head>
<body class="bg-[#050505] text-white p-6">

  <div class="mb-8">
    <h1 class="text-5xl font-bold mb-2">DASHBOARD</h1>
    <div id="current-date" class="text-zinc-500 font-bold text-xl uppercase tracking-widest"></div>
  </div>

  <div class="mb-10">
    <input type="text" id="search-box" placeholder="ENTER TICKER..." class="w-full bg-[#18181b] border-4 border-zinc-700 p-6 text-4xl text-white uppercase outline-none focus:border-emerald-500 rounded">
  </div>

  <div id="dashboard" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-[#111] p-6 rounded border-l-4 border-emerald-500"><div class="label">Previous Close</div><div id="val-close" class="data-val">--</div></div>
    <div class="bg-[#111] p-6 rounded border-l-4 border-emerald-500"><div class="label">Open Price</div><div id="val-open" class="data-val">--</div></div>
    <div class="bg-[#111] p-6 rounded border-l-4 border-emerald-500"><div class="label">Current Price</div><div id="val-current" class="data-val">--</div></div>
    <div class="bg-[#111] p-6 rounded border-l-4 border-emerald-500"><div class="label">After Hours</div><div id="val-ah" class="data-val">--</div></div>
    <div class="bg-[#111] p-6 rounded border-l-4 border-emerald-500 col-span-1 md:col-span-2"><div class="label">Overnight Status</div><div id="val-overnight" class="data-val text-emerald-400">--</div></div>
  </div>

<script>
  document.getElementById('current-date').innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  document.getElementById('search-box').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
      const sym = e.target.value.toUpperCase();
      document.getElementById('dashboard').classList.remove('hidden');
      
      try {
        const res = await fetch(`https://my-stock-proxy.onrender.com/stock/${sym}`);
        const data = await res.json();
        const q = data.chart.result[0].meta;
        const prices = data.chart.result[0].indicators.quote[0];

        document.getElementById('val-close').innerText = "$" + q.chartPreviousClose.toFixed(2);
        document.getElementById('val-open').innerText = "$" + prices.open[0].toFixed(2);
        document.getElementById('val-current').innerText = "$" + q.regularMarketPrice.toFixed(2);
        
        const ahPrice = q.postMarketPrice || q.preMarketPrice || 0;
        document.getElementById('val-ah').innerText = ahPrice > 0 ? "$" + ahPrice.toFixed(2) : "N/A";
        document.getElementById('val-overnight').innerText = (q.postMarketPrice) ? "MARKET ACTIVE (AH)" : "MARKET CLOSED";
      } catch (err) {
        alert("Ticker not found");
      }
    }
  });
</script>
</body>
</html>
